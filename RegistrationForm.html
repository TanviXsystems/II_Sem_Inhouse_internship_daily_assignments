<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="RegistrationForm.css">
    <title>Registration</title>

</head>
<body>
    <div class="container">
          <h1>Registration Form</h1>
          <br>
          <br>
       <form>
        
           <label>Name:</label><input type="text" required placeholder="Enter your Name">
        
        <div>
            <label >Branch:</label><input type="text" required placeholder="Enter Branch">
        </div>
        <div>
            <label>College:</label><input type="text" required placeholder="Enter College">
        </div>
        <div>
            <label>Section:</label><input type="text" >
        </div>
        <div>
            <label>Email Id:</label><input type="email" required placeholder="Enter your Email">
        </div>
        <div>
            <label>Date of Birth:</label><input type="date">
        </div>
        <div>
            <label>Contact No. :</label><input type="tel" >
        </div>
        <div>
            <label>Address Line 1:</label><input type="text" required placeholder="Street Line">
        </div>
        <div>
            <label>Address Line 2:</label><input type="text" required placeholder="Address line 2">
        </div>
        
        <div>
            <label>City/District:</label><input type="text" required placeholder="Enter City ">
        </div>
        <div>
            <label>State:</label><input type="text" required placeholder="Enter State">
        </div>
        <br>
        <br>
        <button type="submit">Register Now</button>
        </form>
    </div>    
</body>
</html>
